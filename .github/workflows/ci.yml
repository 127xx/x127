name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - LICENSE
  pull_request:
    paths-ignore:
      - '**.md'
      - LICENSE

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # 外部依存(go.sum)が無い間はキャッシュ対象が無いため無効化。依存追加時に true へ。
          cache: false

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "以下のファイルが gofmt 未整形です:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          # 外部依存(go.sum)が無い間はキャッシュ対象が無いため無効化。依存追加時に true へ。
          cache: false

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...
