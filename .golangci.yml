version: "2"

linters:
  # standard は errcheck / govet / ineffassign / staticcheck / unused を有効化する
  default: standard
  enable:
    - noctx
  settings:
    errcheck:
      # CLI の usage 表示など標準出力/標準エラーへの書き込み失敗は対処不能なため除外する
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    rules:
      # テストは実ネットワーク呼び出しを行わないため noctx を除外する(#29)
      - path: _test\.go
        linters:
          - noctx
